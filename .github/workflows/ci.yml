name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Production build (frontend)
        run: npm run build

  build:
    needs: quality
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            pkg-config

      - name: Install dependencies
        run: npm ci

      - name: Build Rust backend
        run: cargo build --bin server
        working-directory: src-tauri

      - name: Build frontend
        run: npm run build

      - name: Verify binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f src-tauri/target/debug/server.exe && echo "OK: server.exe"
          else
            test -f src-tauri/target/debug/server && echo "OK: server"
          fi

  release-build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            pkg-config

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri desktop app
        run: npm run tauri build

      - name: Build server binary (release)
        run: cargo build --bin server --release
        working-directory: src-tauri

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist/artifacts
          BUNDLE_DIR="src-tauri/target/release/bundle"
          SERVER_BIN="src-tauri/target/release/server"

          if [ -d "$BUNDLE_DIR" ]; then
            find "$BUNDLE_DIR" -type f \( -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" \) -exec cp {} dist/artifacts/ \;
          fi

          if [ "${{ runner.os }}" = "Windows" ]; then
            [ -f "${SERVER_BIN}.exe" ] && cp "${SERVER_BIN}.exe" dist/artifacts/
          else
            [ -f "$SERVER_BIN" ] && cp "$SERVER_BIN" dist/artifacts/
          fi

          echo "=== Artifacts ==="
          ls -la dist/artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ runner.os }}
          path: dist/artifacts/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: dist/artifacts

      - name: List all artifacts
        run: ls -la dist/artifacts/

      - name: Generate release notes
        id: changelog
        shell: bash
        run: |
          PREV=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV" ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "## O que mudou" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            git log --oneline --no-merges -30 >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "Changelog completo: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "## O que mudou desde $PREV" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo '### Mudanças' >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            git log "$PREV..HEAD" --oneline --no-merges >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "---" >> $GITHUB_OUTPUT
            echo "Changelog completo: https://github.com/${{ github.repository }}/compare/$PREV...${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AtendeMente ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
